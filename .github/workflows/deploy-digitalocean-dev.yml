# Deploy Next.js web stack from this repository root (Docker + Traefik on avcd_edge).
# GitHub bootstrap: org secrets/vars via Infisical sync + pulumi-infra github stack (avcd-app).
# App secrets: Infisical project avcd-web on secrets.dev.avcd.ai (OIDC via deploy host SSH).

name: Deploy web to DigitalOcean (dev)

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "types/**"
      - "components/**"
      - "public/**"
      - "config/**"
      - ".kamal/**"
      - "Dockerfile"
      - "next.config.ts"
      - "next.config.mjs"
      - "middleware.ts"
      - "messages/**"
      - "i18n/**"
      - "package.json"
      - "package-lock.json"
      - "auth.ts"
      - ".github/**"
      - "scripts/ci/**"
  workflow_dispatch:
    inputs:
      kamal_command:
        description: Kamal command (deploy or setup for first run)
        required: false
        default: deploy
        type: choice
        options:
          - deploy
          - setup
          - redeploy

concurrency:
  group: deploy-web-do-dev
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    env:
      INFISICAL_API_URL: ${{ vars.INFISICAL_API_URL || 'https://secrets.dev.avcd.ai/api' }}
      DEPLOY_USER: ${{ vars.DO_DEPLOY_USER || secrets.DO_DEPLOY_USER || 'deploy' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GitHub Environment configuration
        env:
          DO_DEPLOY_SSH_KEY: ${{ secrets.DO_DEPLOY_SSH_KEY }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
          INFISICAL_OIDC_IDENTITY_ID: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          DOCR_REGISTRY_URL: ${{ vars.DOCR_REGISTRY_URL }}
          DO_DEPLOY_USER: ${{ env.DEPLOY_USER }}
        run: |
          set -euo pipefail
          for key in DO_DEPLOY_SSH_KEY INFISICAL_PROJECT_ID INFISICAL_OIDC_IDENTITY_ID DOCR_REGISTRY_URL DO_DEPLOY_USER; do
            val="${!key:-}"
            [ -n "$val" ] || { echo "::error::Missing $key on development environment (or org secret for DO_DEPLOY_SSH_KEY)"; exit 1; }
            echo "✓ $key is set"
          done

      - name: Resolve Traefik public hostname
        id: traefik_host
        env:
          H1: ${{ vars.DO_PUBLIC_HOST || secrets.DO_PUBLIC_HOST }}
          H2: ${{ vars.PUBLIC_HOST || secrets.PUBLIC_HOST }}
          U1: ${{ vars.DO_WEB_URL || secrets.DO_WEB_URL }}
          U2: ${{ vars.DO_WEB_HEALTH_URL || secrets.DO_WEB_HEALTH_URL }}
          DO_DEPLOY_HOST: ${{ vars.DO_DEPLOY_HOST || secrets.DO_DEPLOY_HOST }}
        run: |
          set -euo pipefail
          H="${H1:-}"; [ -n "$H" ] || H="${H2:-}"
          if [ -z "$H" ]; then
            U="${U1:-}"; [ -n "$U" ] || U="${U2:-}"
            if [ -n "$U" ]; then
              H="${U#https://}"; H="${H#http://}"; H="${H%%/*}"
            fi
          fi
          if [ -z "$H" ] && [ -n "${DO_DEPLOY_HOST:-}" ]; then
            H="${DO_DEPLOY_HOST}"
          fi
          if [ -z "$H" ]; then
            echo "::error::Set DO_PUBLIC_HOST, PUBLIC_HOST, DO_WEB_URL, DO_WEB_HEALTH_URL, or DO_DEPLOY_HOST."
            exit 1
          fi
          echo "host=$H" >> "$GITHUB_OUTPUT"
          echo "health_url=https://${H}/health" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy targets
        id: deploy
        env:
          DO_DEPLOY_HOST: ${{ vars.DO_DEPLOY_HOST || secrets.DO_DEPLOY_HOST }}
          DOCR_REGISTRY_URL: ${{ vars.DOCR_REGISTRY_URL }}
        run: |
          set -euo pipefail
          H="${{ steps.traefik_host.outputs.host }}"
          R="${DOCR_REGISTRY_URL:-}"
          [ -n "$R" ] || { echo "::error::Set DOCR_REGISTRY_URL org variable"; exit 1; }
          echo "host=$H" >> "$GITHUB_OUTPUT"
          echo "health_url=https://${H}/health" >> "$GITHUB_OUTPUT"
          echo "docr_url=$R" >> "$GITHUB_OUTPUT"
          echo "ssh_host=${DO_DEPLOY_HOST:-$H}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH key
        env:
          DEPLOY_HOST: ${{ steps.deploy.outputs.ssh_host }}
          DEPLOY_USER: ${{ env.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.DO_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          [ -n "${SSH_PRIVATE_KEY:-}" ] || { echo "::error::DO_DEPLOY_SSH_KEY is empty. Set org/environment secret."; exit 1; }
          install -d -m 700 ~/.ssh
          umask 077
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -R "${DEPLOY_HOST}" -f ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          {
            printf 'Host %s\n' "${DEPLOY_HOST}"
            printf '  HostName %s\n' "${DEPLOY_HOST}"
            printf '  User %s\n' "${DEPLOY_USER}"
            printf '  IdentityFile ~/.ssh/deploy_key\n'
            printf '  StrictHostKeyChecking accept-new\n'
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          ssh -o BatchMode=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "echo ok" \
            || { echo "::error::SSH to ${DEPLOY_USER}@${DEPLOY_HOST} failed. Add DO_DEPLOY_SSH_KEY pubkey to the droplet authorized_keys for user ${DEPLOY_USER}."; exit 1; }

      - name: Render Kamal secrets via deploy host (Infisical OIDC)
        env:
          DEPLOY_HOST: ${{ steps.deploy.outputs.ssh_host }}
          DEPLOY_USER: ${{ env.DEPLOY_USER }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
          INFISICAL_INFRA_PROJECT_ID: ${{ vars.INFISICAL_INFRA_PROJECT_ID || 'e9b80cfd-9be4-4024-a1d6-753db87bc3b9' }}
          INFISICAL_OIDC_IDENTITY_ID: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          INFISICAL_OIDC_AUDIENCE: ${{ vars.INFISICAL_OIDC_AUDIENCE || 'https://github.com/Avocado-Technology' }}
          INFISICAL_BOOTSTRAP_PATH: ${{ vars.INFISICAL_BOOTSTRAP_PATH || '/ci-bootstrap' }}
          PUBLIC_HOST: ${{ steps.traefik_host.outputs.host }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          [ -n "${INFISICAL_OIDC_IDENTITY_ID:-}" ] || { echo "::error::Set INFISICAL_OIDC_IDENTITY_ID on the development environment."; exit 1; }
          [ -n "${INFISICAL_PROJECT_ID:-}" ] || { echo "::error::Set INFISICAL_PROJECT_ID on the development environment."; exit 1; }
          sudo apt-get update -qq && sudo apt-get install -y jq
          OIDC_JWT=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${INFISICAL_OIDC_AUDIENCE}" | jq -r .value)
          if [ -z "${OIDC_JWT:-}" ] || [ "$OIDC_JWT" = "null" ]; then
            echo "::error::Failed to obtain GitHub OIDC token"
            exit 1
          fi
          export OIDC_JWT INFISICAL_API_URL INFISICAL_BOOTSTRAP_PATH
          chmod +x scripts/ci/render-secrets-via-deploy-host.sh
          ./scripts/ci/render-secrets-via-deploy-host.sh

      - name: Verify Keycloak secrets from Infisical
        env:
          PUBLIC_HOST: ${{ steps.traefik_host.outputs.host }}
        run: |
          set -euo pipefail
          set -a
          # shellcheck disable=SC1091
          source .kamal/secrets
          set +a
          for key in AUTH_SECRET KEYCLOAK_CLIENT_SECRET KEYCLOAK_AUDIENCE KEYCLOAK_URL KEYCLOAK_CLIENT_ID KEYCLOAK_OIDC_SCOPE; do
            eval "val=\${$key:-}"
            if [ -z "$val" ]; then
              echo "::error::Missing $key in Infisical (project web, env dev)"
              exit 1
            fi
            echo "::add-mask::$val"
          done
          if echo "$KEYCLOAK_OIDC_SCOPE" | grep -q offline_access; then
            echo "::error::KEYCLOAK_OIDC_SCOPE must not include offline_access"
            exit 1
          fi
          if [[ "${KEYCLOAK_AUDIENCE}" == */ ]]; then
            echo "::error::KEYCLOAK_AUDIENCE must not end with /"
            exit 1
          fi
          response="$(curl -s -X POST "${KEYCLOAK_URL%/}/realms/${KEYCLOAK_REALM:-avcd}/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${KEYCLOAK_CLIENT_ID}" \
            -d "client_secret=${KEYCLOAK_CLIENT_SECRET}" \
            -d "grant_type=authorization_code" \
            -d "code=avcd-verify-web-oidc-client-secret" \
            -d "redirect_uri=https://${PUBLIC_HOST}/api/auth/callback/keycloak")"
          error="$(echo "$response" | jq -r '.error // empty')"
          if [ "$error" != "invalid_grant" ]; then
            echo "::error::KEYCLOAK_CLIENT_SECRET rejected by Keycloak ($error)"
            echo "$response" >&2
            exit 1
          fi
          echo "✓ Keycloak accepted avcd-web client credentials from Infisical"

      - name: Deploy web with Kamal
        uses: Avocado-Technology/avcd-actions/kamal-deploy@v5.5
        with:
          deploy_host: ${{ steps.deploy.outputs.host }}
          deploy_user: ${{ env.DEPLOY_USER }}
          ssh_key: ${{ secrets.DO_DEPLOY_SSH_KEY }}
          docr_registry_url: ${{ steps.deploy.outputs.docr_url }}
          infisical_api_url: ${{ env.INFISICAL_API_URL }}
          infisical_project_id: ${{ vars.INFISICAL_PROJECT_ID }}
          infisical_infra_project_id: ${{ vars.INFISICAL_INFRA_PROJECT_ID || 'e9b80cfd-9be4-4024-a1d6-753db87bc3b9' }}
          infisical_oidc_identity_id: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          infisical_oidc_audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || 'https://github.com/Avocado-Technology' }}
          infisical_env: dev
          public_host: ${{ steps.traefik_host.outputs.host }}
          kamal_version: ${{ vars.KAMAL_VERSION || '2.11.0' }}
          kamal_destination: development
          kamal_command: ${{ github.event_name == 'workflow_dispatch' && inputs.kamal_command || 'deploy' }}
          skip_accessory_boot: "true"
          skip_secrets_render: "true"
          verify_url: ${{ vars.DO_WEB_HEALTH_URL || steps.deploy.outputs.health_url }}
          verify_body_substring: '"status":"ok"'
