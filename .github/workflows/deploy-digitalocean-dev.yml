# Deploy Next.js web stack from this repository root (Docker + Traefik on avcd_edge).
# Configure DO_* in GitHub: Settings → Environments → development (or repo Variables / Secrets).

name: Deploy web to DigitalOcean (dev)

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "types/**"
      - "components/**"
      - "public/**"
      - "deploy/production/**"
      - "Dockerfile"
      - "Dockerfile.dev"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
      - "auth.ts"
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: deploy-web-do-dev
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Traefik public hostname
        id: traefik_host
        env:
          H1: ${{ vars.DO_PUBLIC_HOST || secrets.DO_PUBLIC_HOST }}
          H2: ${{ vars.PUBLIC_HOST || secrets.PUBLIC_HOST }}
          U1: ${{ vars.DO_WEB_URL || secrets.DO_WEB_URL }}
          U2: ${{ vars.DO_WEB_HEALTH_URL || secrets.DO_WEB_HEALTH_URL }}
        run: |
          set -euo pipefail
          H="${H1:-}"; [ -n "$H" ] || H="${H2:-}"
          if [ -z "$H" ]; then
            U="${U1:-}"; [ -n "$U" ] || U="${U2:-}"
            if [ -n "$U" ]; then
              H="${U#https://}"; H="${H#http://}"; H="${H%%/*}"
            fi
          fi
          if [ -z "$H" ]; then
            echo "::error::Set DO_PUBLIC_HOST, PUBLIC_HOST, DO_WEB_URL, or DO_WEB_HEALTH_URL for this environment."
            exit 1
          fi
          echo "host=$H" >> "$GITHUB_OUTPUT"

      - name: Deploy web stack
        uses: ./.github/actions/droplet-compose-deploy
        with:
          deploy_host: ${{ vars.DO_DEPLOY_HOST || secrets.DO_DEPLOY_HOST }}
          deploy_user: ${{ vars.DO_DEPLOY_USER || secrets.DO_DEPLOY_USER }}
          deploy_path: ${{ vars.DO_DEPLOY_PATH || secrets.DO_DEPLOY_PATH }}
          ssh_key: ${{ secrets.DO_DEPLOY_SSH_KEY }}
          compose_subdirectory: "deploy/production"
          public_host: ${{ steps.traefik_host.outputs.host }}
          acme_email: ""
          pass_compose_tls_env: "false"
          clear_published_ports: "3000"
          verify_mode: http
          verify_url: ${{ vars.DO_WEB_HEALTH_URL || secrets.DO_WEB_HEALTH_URL }}
          verify_body_substring: '"status":"ok"'
          verify_http_insecure_first: "false"
          web_auth0_secret: ${{ secrets.WEB_AUTH0_SECRET }}
          web_auth0_issuer: ${{ vars.WEB_AUTH0_ISSUER || secrets.WEB_AUTH0_ISSUER }}
          web_auth0_client_id: ${{ secrets.WEB_AUTH0_CLIENT_ID }}
          web_auth0_client_secret: ${{ secrets.WEB_AUTH0_CLIENT_SECRET }}
          web_auth0_audience: ${{ vars.WEB_AUTH0_AUDIENCE || secrets.WEB_AUTH0_AUDIENCE }}
          web_auth0_scope: "openid profile email offline_access"
          web_base_url: ${{ vars.WEB_BASE_URL }}
