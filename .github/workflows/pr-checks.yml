name: PR Checks (Lint, Test, Build)

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "types/**"
      - "components/**"
      - "public/**"
      - "config/**"
      - ".kamal/**"
      - "Dockerfile"
      - "next.config.ts"
      - "next.config.mjs"
      - "middleware.ts"
      - "messages/**"
      - "i18n/**"
      - "package.json"
      - "package-lock.json"
      - "commitlint.config.js"
      - ".releaserc.json"
      - "auth.ts"
      - "__tests__/**"
      - "jest.config.js"
      - "Makefile"
      - "scripts/**"
      - "tests/test_upload_secret.sh"
      - ".github/**"

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate commit messages
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

      - name: Verify Infisical upload-secret Makefile
        run: make test-upload-secret

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          CI: true
          E2E_SKIP_DEPLOY: "1"
        run: npm test

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          AUTH_SECRET: build-time-placeholder-secret-min-32-chars-long-for-auth0-x
          APP_BASE_URL: http://localhost:3000
          KEYCLOAK_URL: https://placeholder.keycloak.example
          KEYCLOAK_REALM: avcd
          KEYCLOAK_CLIENT_ID: build-placeholder
          KEYCLOAK_CLIENT_SECRET: build-placeholder
          KEYCLOAK_AUDIENCE: https://placeholder.example/api
          NEXT_PUBLIC_GRAPHQL_ENDPOINT: http://localhost:8000/graphql
          NEXT_PUBLIC_ENABLE_MOBILE_BOTTOM_NAV: "true"
        run: npm run build
