# Deploy web to **prod** (tag *-release or manual) via Kamal + Infisical OIDC.
# Version: v1.2.3-release → kamal deploy -d production --version=1.2.3

name: Deploy web to DigitalOcean (prod)

on:
  push:
    tags:
      - "*-release"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to deploy (e.g. 1.2.3). Required for manual runs without a release tag."
        required: false
        type: string
      kamal_command:
        description: "Kamal command (deploy, setup, rollback)"
        required: false
        default: deploy
        type: choice
        options:
          - deploy
          - setup
          - rollback
          - redeploy

concurrency:
  group: deploy-web-do-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Traefik public hostname
        id: traefik_host
        env:
          H1: ${{ vars.DO_PUBLIC_HOST || secrets.DO_PUBLIC_HOST }}
          H2: ${{ vars.PUBLIC_HOST || secrets.PUBLIC_HOST }}
          U1: ${{ vars.DO_WEB_URL || secrets.DO_WEB_URL }}
          U2: ${{ vars.DO_WEB_HEALTH_URL || secrets.DO_WEB_HEALTH_URL }}
          DO_DEPLOY_HOST: ${{ vars.DO_DEPLOY_HOST || secrets.DO_DEPLOY_HOST }}
        run: |
          set -euo pipefail
          H="${H1:-}"; [ -n "$H" ] || H="${H2:-}"
          if [ -z "$H" ]; then
            U="${U1:-}"; [ -n "$U" ] || U="${U2:-}"
            if [ -n "$U" ]; then
              H="${U#https://}"; H="${H#http://}"; H="${H%%/*}"
            fi
          fi
          if [ -z "$H" ] && [ -n "${DO_DEPLOY_HOST:-}" ]; then
            H="${DO_DEPLOY_HOST}"
          fi
          if [ -z "$H" ]; then
            echo "::error::Set DO_PUBLIC_HOST, PUBLIC_HOST, DO_WEB_URL, DO_WEB_HEALTH_URL, or DO_DEPLOY_HOST."
            exit 1
          fi
          echo "host=$H" >> "$GITHUB_OUTPUT"
          echo "health_url=https://${H}/health" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_VERSION:-}" ]; then
            VERSION="${DISPATCH_VERSION#v}"
          else
            REF="${GITHUB_REF_NAME:-}"
            VERSION="${REF%-release}"
            VERSION="${VERSION#v}"
          fi
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be semver x.y.z (from tag vX.Y.Z-release or workflow input)"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Deploying avcd-web version ${VERSION}"

      - name: Resolve deploy targets
        id: deploy
        env:
          DO_DEPLOY_HOST: ${{ vars.DO_DEPLOY_HOST || secrets.DO_DEPLOY_HOST }}
          DOCR_REGISTRY_URL: ${{ vars.DOCR_REGISTRY_URL }}
        run: |
          set -euo pipefail
          H="${{ steps.traefik_host.outputs.host }}"
          R="${DOCR_REGISTRY_URL:-}"
          [ -n "$R" ] || { echo "::error::Set DOCR_REGISTRY_URL org variable"; exit 1; }
          echo "host=$H" >> "$GITHUB_OUTPUT"
          echo "health_url=https://${H}/health" >> "$GITHUB_OUTPUT"
          echo "docr_url=$R" >> "$GITHUB_OUTPUT"

      - name: Deploy web with Kamal
        uses: Avocado-Technology/avcd-actions/kamal-deploy@feat/web-kamal-cicd
        with:
          deploy_host: ${{ steps.deploy.outputs.host }}
          deploy_user: ${{ vars.DO_DEPLOY_USER || secrets.DO_DEPLOY_USER }}
          ssh_key: ${{ secrets.DO_DEPLOY_SSH_KEY }}
          docr_registry_url: ${{ steps.deploy.outputs.docr_url }}
          infisical_api_url: ${{ vars.INFISICAL_API_URL || 'https://secrets.avcd.ai/api' }}
          infisical_project_id: ${{ vars.INFISICAL_PROJECT_ID }}
          infisical_infra_project_id: ${{ vars.INFISICAL_INFRA_PROJECT_ID || 'e9b80cfd-9be4-4024-a1d6-753db87bc3b9' }}
          infisical_oidc_identity_id: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          infisical_oidc_audience: ${{ vars.INFISICAL_OIDC_AUDIENCE || 'https://github.com/Avocado-Technology' }}
          infisical_env: prod
          public_host: ${{ steps.traefik_host.outputs.host }}
          kamal_version: ${{ vars.KAMAL_VERSION || '2.11.0' }}
          kamal_destination: production
          kamal_command: ${{ inputs.kamal_command || 'deploy' }}
          image_version: ${{ steps.version.outputs.version }}
          skip_accessory_boot: "true"
          verify_url: ${{ vars.DO_WEB_HEALTH_URL || steps.deploy.outputs.health_url }}
          verify_body_substring: '"status":"ok"'
