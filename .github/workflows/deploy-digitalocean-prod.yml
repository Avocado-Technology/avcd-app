# Deploy web stack to **prod** (tag *-release or manual).
# App secrets: Infisical project web — OIDC export (env prod).

name: Deploy web to DigitalOcean (prod)

on:
  push:
    tags:
      - "*-release"
  workflow_dispatch:

concurrency:
  group: deploy-web-do-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Traefik public hostname
        id: traefik_host
        env:
          H1: ${{ vars.DO_PUBLIC_HOST || secrets.DO_PUBLIC_HOST }}
          H2: ${{ vars.PUBLIC_HOST || secrets.PUBLIC_HOST }}
          U1: ${{ vars.DO_WEB_URL || secrets.DO_WEB_URL }}
          U2: ${{ vars.DO_WEB_HEALTH_URL || secrets.DO_WEB_HEALTH_URL }}
          DO_DEPLOY_HOST: ${{ vars.DO_DEPLOY_HOST || secrets.DO_DEPLOY_HOST }}
        run: |
          set -euo pipefail
          H="${H1:-}"; [ -n "$H" ] || H="${H2:-}"
          if [ -z "$H" ]; then
            U="${U1:-}"; [ -n "$U" ] || U="${U2:-}"
            if [ -n "$U" ]; then
              H="${U#https://}"; H="${H#http://}"; H="${H%%/*}"
            fi
          fi
          if [ -z "$H" ] && [ -n "${DO_DEPLOY_HOST:-}" ]; then
            H="${DO_DEPLOY_HOST}"
          fi
          if [ -z "$H" ]; then
            echo "::error::Set DO_PUBLIC_HOST, PUBLIC_HOST, DO_WEB_URL, DO_WEB_HEALTH_URL, or DO_DEPLOY_HOST."
            exit 1
          fi
          echo "host=$H" >> "$GITHUB_OUTPUT"
          echo "health_url=https://${H}/health" >> "$GITHUB_OUTPUT"

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical
          infisical --version

      - name: Fetch Secrets from Infisical
        env:
          INFISICAL_API_URL: ${{ vars.INFISICAL_API_URL || 'https://secrets.dev.avcd.ai/api' }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
          INFISICAL_OIDC_IDENTITY_ID: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          PUBLIC_HOST: ${{ steps.traefik_host.outputs.host }}
        run: |
          [ -n "${INFISICAL_OIDC_IDENTITY_ID:-}" ] || { echo "::error::Set INFISICAL_OIDC_IDENTITY_ID on the production environment."; exit 1; }
          [ -n "${INFISICAL_PROJECT_ID:-}" ] || { echo "::error::Set INFISICAL_PROJECT_ID on the production environment."; exit 1; }
          export INFISICAL_TOKEN=$(infisical login --method=oidc \
            --identity-id="$INFISICAL_OIDC_IDENTITY_ID" \
            --domain="${INFISICAL_API_URL%/api}" --silent --plain)
          infisical export --env=prod --path=/ \
            --projectId="$INFISICAL_PROJECT_ID" --token="$INFISICAL_TOKEN" \
            --format=dotenv --domain="${INFISICAL_API_URL%/api}" --silent \
            > .env.infisical
          test -s .env.infisical || (echo "::error::Infisical export empty (web project, env prod)" && exit 1)
          {
            echo "PUBLIC_HOST=${PUBLIC_HOST}"
            echo "NEXT_PUBLIC_GRAPHQL_ENDPOINT=https://${PUBLIC_HOST}/api/graphql"
            echo "NEXT_PUBLIC_MCP_SERVER_URL=https://${PUBLIC_HOST}/mcp"
          } >> .env.infisical
          set -a
          # shellcheck disable=SC1091
          source .env.infisical
          set +a
          for key in AUTH_SECRET KEYCLOAK_CLIENT_SECRET KEYCLOAK_AUDIENCE KEYCLOAK_URL KEYCLOAK_CLIENT_ID; do
            eval "val=\${$key:-}"
            if [ -z "$val" ]; then
              echo "::error::Missing $key in Infisical (project web, env prod)"
              exit 1
            fi
            echo "::add-mask::$val"
          done
          echo "✓ Infisical export ready"

      - name: Copy .env.infisical to deploy directory
        run: |
          cp .env.infisical deploy/production/.env.infisical
          ls -la deploy/production/.env.infisical

      - name: Deploy web stack
        uses: Avocado-Technology/avcd-actions/droplet-compose-deploy@v2
        with:
          deploy_host: ${{ vars.DO_DEPLOY_HOST || secrets.DO_DEPLOY_HOST }}
          deploy_user: ${{ vars.DO_DEPLOY_USER || secrets.DO_DEPLOY_USER }}
          deploy_path: ${{ vars.DO_DEPLOY_PATH || secrets.DO_DEPLOY_PATH }}
          ssh_key: ${{ secrets.DO_DEPLOY_SSH_KEY }}
          compose_subdirectory: "deploy/production"
          public_host: ${{ steps.traefik_host.outputs.host }}
          acme_email: ""
          pass_compose_tls_env: "false"
          clear_published_ports: "3000"
          verify_mode: http
          verify_url: ${{ vars.DO_WEB_HEALTH_URL || steps.traefik_host.outputs.health_url }}
          verify_body_substring: '"status":"ok"'
          verify_http_insecure_first: "false"
