# Deploy web to **prod** (tag *-release or manual).
# Set DO_WEB_URL on the environment for post-deploy HTTPS checks; if unset, deploy still runs (verify skipped).
# Monorepo: use compose_subdirectory "web" and adjust checkout paths as needed.

name: Deploy web to DigitalOcean (prod)

on:
  push:
    tags:
      - "*-release"
  workflow_dispatch:

concurrency:
  group: deploy-web-do-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post-deploy verify reminder
        if: ${{ vars.DO_WEB_URL == '' }}
        run: |
          echo "::warning::DO_WEB_URL is not set on this environment. Deploy will proceed without the post-deploy HTTP check. Add variable DO_WEB_URL (full HTTPS URL) to enable verification."

      - name: Deploy web stack
        uses: Avocado-Technology/avcd-actions/droplet-compose-deploy@v1
        with:
          deploy_host: ${{ vars.DO_DEPLOY_HOST || secrets.DO_DEPLOY_HOST }}
          deploy_user: ${{ vars.DO_DEPLOY_USER || secrets.DO_DEPLOY_USER }}
          deploy_path: ${{ vars.DO_DEPLOY_PATH || secrets.DO_DEPLOY_PATH }}
          ssh_key: ${{ secrets.DO_DEPLOY_SSH_KEY }}
          compose_subdirectory: "."
          public_host: ""
          acme_email: ""
          pass_compose_tls_env: "false"
          clear_published_ports: "none"
          verify_mode: ${{ vars.DO_WEB_URL != '' && 'http' || 'none' }}
          verify_url: ${{ vars.DO_WEB_URL }}
          verify_body_substring: "AVCD Tech"
          verify_http_insecure_first: "false"
