# Kamal deploy — AVCD Web (Next.js, Traefik on avcd_edge)

service: avcd-web
image: avcd/web

# Kamal 2: no root-level healthcheck; Traefik routes traffic (proxy: false).
deploy_timeout: 180

ssh:
  user: __DO_DEPLOY_USER__

servers:
  web:
    hosts:
      - __DO_DEPLOY_HOST__
    proxy: false
    options:
      network: avcd_edge
      health-cmd: >-
        node -e "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      health-interval: 10s
      health-retries: 12
      health-timeout: 5s
      health-start-period: 90s
    labels:
      traefik.enable: "true"
      traefik.docker.network: avcd_edge
      traefik.http.routers.avcd-web.rule: Host(`__DO_DEPLOY_HOST__`)
      traefik.http.routers.avcd-web.entrypoints: websecure
      traefik.http.routers.avcd-web.tls: "true"
      traefik.http.routers.avcd-web.tls.certresolver: le
      traefik.http.routers.avcd-web.priority: "50"
      traefik.http.routers.avcd-web.service: avcd-web
      traefik.http.services.avcd-web.loadbalancer.server.port: "3000"
      traefik.http.routers.avcd-web-api-auth.rule: Host(`__DO_DEPLOY_HOST__`) && PathPrefix(`/api/auth`)
      traefik.http.routers.avcd-web-api-auth.entrypoints: websecure
      traefik.http.routers.avcd-web-api-auth.tls: "true"
      traefik.http.routers.avcd-web-api-auth.tls.certresolver: le
      traefik.http.routers.avcd-web-api-auth.priority: "150"
      traefik.http.routers.avcd-web-api-auth.service: avcd-web
      traefik.http.routers.avcd-web-api-chat.rule: Host(`__DO_DEPLOY_HOST__`) && PathPrefix(`/api/chat`)
      traefik.http.routers.avcd-web-api-chat.entrypoints: websecure
      traefik.http.routers.avcd-web-api-chat.tls: "true"
      traefik.http.routers.avcd-web-api-chat.tls.certresolver: le
      traefik.http.routers.avcd-web-api-chat.priority: "150"
      traefik.http.routers.avcd-web-api-chat.service: avcd-web

registry:
  server: __DOCR_REGISTRY_SERVER__
  username:
    - DOCR_USERNAME
  password:
    - REGISTRY_PASSWORD

builder:
  arch: amd64
  context: .
  dockerfile: Dockerfile
  args:
    AUTH0_BASE_URL: https://__DO_DEPLOY_HOST__
    NEXT_PUBLIC_GRAPHQL_ENDPOINT: https://__DO_DEPLOY_HOST__/api/graphql
    NEXT_PUBLIC_ENABLE_MOBILE_BOTTOM_NAV: "true"

env:
  # Infisical → .kamal/secrets (see config/infisical-secret-keys.list)
  secret:
    - AUTH_SECRET
    - KEYCLOAK_CLIENT_SECRET
    # OPENAI_API_KEY: optional — add to Infisical + env.secret when chat is needed
  # Non-sensitive runtime config (committed; no Infisical)
  clear:
    NODE_ENV: production
    KEYCLOAK_URL: https://auth.avcd.ai
    KEYCLOAK_REALM: avcd
    KEYCLOAK_CLIENT_ID: avcd-web
    KEYCLOAK_AUDIENCE: https://__DO_DEPLOY_HOST__/api
    KEYCLOAK_OIDC_SCOPE: openid profile email
    AUTH_URL: https://__DO_DEPLOY_HOST__
    APP_BASE_URL: https://__DO_DEPLOY_HOST__
    PUBLIC_HOST: __DO_DEPLOY_HOST__
    NEXT_PUBLIC_GRAPHQL_ENDPOINT: https://__DO_DEPLOY_HOST__/api/graphql
    NEXT_PUBLIC_MCP_SERVER_URL: https://__DO_DEPLOY_HOST__/mcp
    NEXT_PUBLIC_APP_NAME: AVCD
    NEXT_PUBLIC_PROFILE_ROUTE: /api/auth/profile
    NEXT_PUBLIC_FINANCE_DATA_SOURCE: mock
    CHAT_MODEL: gpt-4o
