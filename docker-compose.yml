# Local development with hot reload
# Prerequisites: None (standalone)
# Usage: docker compose up --build
# Hot reload: Edit files locally, changes reflect instantly
#
# The web_node_modules volume keeps Linux-built deps. After changing package-lock.json,
# entrypoint runs npm ci when the lockfile checksum changes. To force a full reinstall:
#   FORCE_NPM_CI=1 docker compose up --build
# Or remove the volume: docker compose down -v && docker compose up --build

services:
  web:
    container_name: web-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Persist deps in-container (see header); entrypoint syncs from package-lock.json
      - web_node_modules:/app/node_modules
      # Prevent overwriting .next (use container's version)
      - /app/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      # CRITICAL: Enable file watching in Docker (macOS/Windows)
      WATCHPACK_POLLING: "true"
      # Development mode
      NODE_ENV: development
      # Auth0 Configuration
      AUTH0_SECRET: ${AUTH0_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL:-http://localhost:3000}
      AUTH0_ISSUER_BASE_URL: ${AUTH0_ISSUER_BASE_URL:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_SCOPE: ${AUTH0_SCOPE:-openid profile email offline_access}
      # API URLs
      NEXT_PUBLIC_AVCD_API_URL: ${NEXT_PUBLIC_AVCD_API_URL:-http://localhost:8000}
      AVCD_AUTH_URL: ${AVCD_AUTH_URL:-http://host.docker.internal:8010}
      # MCP URLs
      NEXT_PUBLIC_AUTH0_MCP_CLIENT_ID: ${NEXT_PUBLIC_AUTH0_MCP_CLIENT_ID:-}
      NEXT_PUBLIC_MCP_SERVER_URL: ${NEXT_PUBLIC_MCP_SERVER_URL:-http://localhost:8000/mcp}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
    # Optional: Use Compose Watch for advanced sync
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
            - .git/

volumes:
  web_node_modules:
