# Local development with hot reload (Docker Compose Watch)
# Usage: npm run dev   (same as: docker compose up --watch)
# Prerequisites: Copy .env.local.example → .env.local and add Auth0 secrets.
#
# Hot reload: develop.watch syncs files into the container (Compose Watch).
# Fallback without Docker: npm run dev:local
#
# After changing package-lock.json, the entrypoint runs npm ci automatically.
# To force a full reinstall: FORCE_NPM_CI=1 docker compose up --build --watch
# To reset volumes: docker compose down -v && npm run dev

services:
  web:
    container_name: web-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Named volumes keep Linux-built deps and build cache isolated from the host.
    volumes:
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      # Docker-only overrides (secrets stay in .env.local)
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
      AVCD_API_URL: http://api:8000
      AVCD_AUTH_URL: http://host.docker.internal:8010
      AVCD_MCP_URL: http://host.docker.internal:5001/mcp
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
          ignore:
            - node_modules/
            - .next/
        - action: sync
          path: ./lib
          target: /app/lib
        - action: sync
          path: ./components
          target: /app/components
        - action: sync
          path: ./messages
          target: /app/messages
        - action: sync
          path: ./public
          target: /app/public
        - action: sync
          path: ./package.json
          target: /app/package.json
        - action: rebuild
          path: ./package-lock.json
          target: /app/package-lock.json

volumes:
  app_node_modules:
  app_next:
