# Next.js — run from this directory: docker compose up --build
#
# Creates/uses the shared Docker network `avcd_edge` (same name used by Traefik/api).
# Set PUBLIC_HOST to your real hostname (same as Traefik). Put AUTH_*, AVCD_API_URL, etc. in .env or .env.local.
# Traefik routes this service at priority 50; the API router uses /api at priority 110.
# Server-side calls to FastAPI default to http://api:8000 (override AVCD_API_URL if your API DNS name differs).
#
# For local all-in-one (Mongo + API + web without Traefik labels), use the repo-root docker-compose.yml instead.
#
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - default
      - avcd_edge
    env_file:
      - path: .env
        required: false
    environment:
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AVCD_API_URL: ${AVCD_API_URL}
    labels:
      - traefik.enable=true
      - traefik.http.routers.avcd-web.rule=Host(`${PUBLIC_HOST:-localhost}`)
      - traefik.http.routers.avcd-web.entrypoints=websecure
      - traefik.http.routers.avcd-web.tls=true
      - traefik.http.routers.avcd-web.tls.certresolver=le
      - traefik.http.routers.avcd-web.priority=50
      - traefik.http.routers.avcd-web.service=avcd-web
      - traefik.http.services.avcd-web.loadbalancer.server.port=3000

networks:
  avcd_edge:
    name: avcd_edge
    driver: bridge
