# Local development with hot reload (Docker Compose Watch)
# Usage: npm run dev   (same as: docker compose up --watch)
# Prerequisites: Copy .env.local.example → .env.local and add Auth0 secrets.
#
# Hot reload: bind mount + develop.watch (Compose Watch). Without Docker: npm run dev:local
#
# The web_node_modules volume keeps Linux-built deps. After changing package-lock.json,
# entrypoint runs npm ci when the lockfile checksum changes. To force a full reinstall:
#   FORCE_NPM_CI=1 docker compose up --build --watch
# Or remove the volume: docker compose down -v && npm run dev

services:
  web:
    container_name: web-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Persist deps in-container (see header); entrypoint syncs from package-lock.json
      - web_node_modules:/app/node_modules
      # Prevent overwriting .next (use container's version)
      - /app/.next
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      # Docker-only overrides (Compose); secrets stay in .env.local
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
      AVCD_API_URL: http://api:8000
      AVCD_AUTH_URL: http://host.docker.internal:8010
      AVCD_MCP_URL: http://host.docker.internal:5001/mcp
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
            - .git/

volumes:
  web_node_modules:
