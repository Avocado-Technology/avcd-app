# Next.js — run from this directory: docker compose up --build
#
# Attaches to the shared Docker network `avcd_edge` (external — create it first: Traefik stack or
# `docker network create avcd_edge`). Same pattern as avcd-api on the dev/prod droplet.
# PUBLIC_HOST defaults to `localhost` for local `docker compose` (labels interpolate without a `.env`).
# On the droplet set PUBLIC_HOST in `.env` or CI to your real DNS name (same as Traefik). AUTH_* etc. in `.env`.
# AVCD_API_URL defaults to http://api:8000 when unset (Compose on avcd_edge).
# Traefik routes this service at priority 50; the API router uses /api at priority 110.
# Server-side calls to FastAPI default to http://api:8000 (override AVCD_API_URL if your API DNS name differs).
#
# For local all-in-one (Mongo + API + web without Traefik labels), use the repo-root docker-compose.yml instead.
#
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - default
      - avcd_edge
    env_file:
      - path: .env
        required: false
    environment:
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AVCD_API_URL: ${AVCD_API_URL:-http://api:8000}
    labels:
      - traefik.enable=true
      - traefik.http.routers.avcd-web.rule=Host(`${PUBLIC_HOST:-localhost}`)
      - traefik.http.routers.avcd-web.entrypoints=websecure
      - traefik.http.routers.avcd-web.tls=true
      - traefik.http.routers.avcd-web.tls.certresolver=le
      - traefik.http.routers.avcd-web.priority=50
      - traefik.http.routers.avcd-web.service=avcd-web
      - traefik.http.services.avcd-web.loadbalancer.server.port=3000

networks:
  avcd_edge:
    external: true
